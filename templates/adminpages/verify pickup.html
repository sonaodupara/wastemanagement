<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Data Table</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
{% extends 'adminpages/index.html' %}
{% block body %}
  <div class="container mt-5">
    <h2 class="mb-4">Verify pickup</h2>
    <table id="registrationTable" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Logo</th>
          <th>Contact</th>
          <th>Area</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Data Row -->
        {% for i in data %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ i.Name }}</td>
          <td><img src="{{ i.Logo }}" class="img-thumbnail" width="50" /></td>
          <td>
              {{ i.Phone }}<br>
              {{ i.Email }}
          </td>
          <td>{{ i.AREA.Area }}</td>
            <td>
                <a href="/myapp/approve_pickup/{{ i.id }}" class="btn btn-success">Approve</a>
                <a href="/myapp/reject_pickup/{{ i.id }}" class="btn btn-danger">Reject</a></td>
        </tr>
        {% endfor %}
        <!-- Add more rows dynamically from backend -->
      </tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script>
    $(document).ready(function () {
      $('#registrationTable').DataTable();
    });
  </script>
{% endblock %}
</body>
</html>
