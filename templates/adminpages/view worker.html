<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Worker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
{% extends 'adminpages/index.html' %}
{% block body %}
<div class="container mt-5">
    <h2 class="mb-4">Veiw Worker</h2>
    <table id="registrationTable" class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Photo</th>
            <th>Contact</th>
            <th>Lisence</th>
            <th>DOB</th>
            <th>Gender</th>
            <th>Subarea</th>

        </tr>
        </thead>
        <tbody>
        <!-- Sample Data Row -->
        {% for i in data %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{i.Name }}</td>
            <td><img src="{{ i.Photo }}" class="img-thumbnail" width="50"/></td>
            <td>
                {{i.Number }}<br>
                {{i.Email }}
            </td>
            <td><img src="{{i.License}}" class="img-thumbnail" width="50"/></td>
            <td>{{ i.DOB }}</td>
            <td>{{ i.Gender }}</td>
            <td>{{ i.SUBAREA.Subarea }}</td>
        </tr>
        {% endfor %}
        <!-- Addore rows dynamically from backend -->
        </tbody>
    </table>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script>
    $(document).ready(function () {
        $('#registrationTable').DataTable();
    });
</script>
{% endblock %}
</body>
</html>
