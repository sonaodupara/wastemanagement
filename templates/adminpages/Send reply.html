<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional: Font Awesome for star icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
{% extends 'adminpages/index.html' %}
{% block body %}
  <div class="container mt-5">
    <h4 class="mb-4"></h4>
    <form method="post" action="/myapp/adm_send_reply_post/#abc">
        {% csrf_token %}

        <input type="hidden" value="{{ id }}" name="id">
      <!-- Reply Text -->
      <div class="mb-3">
        <label for="reviewText" class="form-label"></label>
        <textarea class="form-control" name="reply" id="reviewText" rows="4" placeholder="Write your reply here..." required></textarea>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-success">Submit Reply</button>
    </form>
  </div>
{% endblock %} }

  <!-- Bootstrap + Font Awesome Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
