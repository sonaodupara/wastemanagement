<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
</head>
<body>
{% extends 'pickuppages/pickupindex.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">Manage staff</h2>
    <form action="/myapp/pickup_editstaff_post/" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" value="{{ data.id }}" name="id">
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" value="{{ data.Name }}" name="name"required>
        </div>
      </div>

             <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Photo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" value="{{ data.Photo }}" name="photo" accept="image/*" required>
        </div>
      </div>

             <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">License</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" value="{{ data.License }}"name="license" accept="image/*" required>
        </div>
      </div>

           <div class="row mb-3">
        <label for="dob" class="col-sm-4 ">Date of Birth</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" id="dob" value="{{ data.DOB|date:'Y-m-d' }}" name="dob" required>
        </div>
      </div>


      <div class="row mb-3">
        <label class="col-sm-4 ">Gender</label>
        <div class="col-sm-8">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="male"  value="male"  required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="female" value="female" required>
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>
      </div>


      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="email" value="{{ data.Email }}" name="email" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" value="{{ data.Number }}"name="phone" required>
        </div>
      </div>


    <div class="form-group">
                        <label for="staff">SubArea</label>
                         <select name="subarea" class="form-control">


              {% for i in data1 %}


              <option   {% if data.SUBAREA.id == i.id %}selected{% endif %} value="{{ i.id }}">{{ i.Subarea }}</option>

              {% endfor %}
          </select>
                    </div>


      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Enter</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
