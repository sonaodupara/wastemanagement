<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View SubArea</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container mt-5">
    <h2 class="mb-4">View Subarea</h2>
    <table id="registrationTable" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Subarea</th>
          <th>Area</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Data Row -->
        {% for i in data %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ i.Subarea }}</td>
          <td>{{ i.AREA.Area }}</td>
          <td><a href="/myapp/pickup_editsubarea/{{ i.id }}#abc" class="btn btn-success">Edit</a>
              <a href="/myapp/pickup_deletesubarea/{{ i.id }}" class="btn btn-danger">Delete</a></td>
        </tr>
        {% endfor %}
        <!-- Add more rows dynamically from backend -->
      </tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script>
    $(document).ready(function () {
      $('#registrationTable').DataTable();
    });
  </script>
{% endblock %}
</body>
</html>
