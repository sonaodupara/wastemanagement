<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container">
    <h2 class="mb-4">Manage Bill</h2>
    <form action="/myapp/pickup_managebill_post/" method="post" enctype="multipart/form-data">
        {% csrf_token %}
<input type="hidden" name="id" value="{{ id }}">

             <div class="row mb-3">
        <label for="Bill" class="col-sm-4 ">Bill</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="Bill" name="Bill" required>
        </div>
      </div>




      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Enter</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
