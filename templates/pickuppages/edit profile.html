<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
{% extends 'pickuppages/pickupindex.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">Edit profile</h2>
    <form method="post" action="/myapp/pickup_editprofile/" enctype="multipart/form-data">
    {% csrf_token %}
        <input type="hidden" value="{{pickup.id  }}" name="id">
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="name" value="{{ pickup.Name }}" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Logo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" name="logo" accept="image/*" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="email" name="email" value="{{ pickup.Email }}" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" name="phone" value="{{ pickup.Phone }}" required>
        </div>
      </div> <div class="row mb-3">
        <label for="latitude" class="col-sm-4 ">Latitude</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="phone" name="latitude" value="{{ pickup.Latitude }}" required>
        </div>
      </div> <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Longitude</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="phone" name="longitude" value="{{ pickup.Longitude }}" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Area</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="place" name="area"value="{{ pickup.AREA.Area }}" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Tagline</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="city" name="tagline"value="{{ pickup.Tagline }}" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
