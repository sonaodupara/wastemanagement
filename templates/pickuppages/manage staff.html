<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
</head>
<body>
{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container">
    <h2 class="mb-4">Manage staff</h2>
    <form action="/myapp/pickup_managestaff_post/" method="post" enctype="multipart/form-data">
    {% csrf_token %}
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="name"required>
        </div>
      </div>

             <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Photo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
        </div>
      </div>

             <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">License</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" name="license" accept="image/*" required>
        </div>
      </div>

           <div class="row mb-3">
        <label for="dob" class="col-sm-4 ">Date of Birth</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" id="dob" name="dob" required>
        </div>
      </div>


      <div class="row mb-3">
        <label class="col-sm-4 ">Gender</label>
        <div class="col-sm-8">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="female" value="female" required>
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>
      </div>


      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" name="phone" required>
        </div>
      </div>


    <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">SubArea</label>
        <div class="col-sm-8">
          <select name="subarea" class="form-control">
            {% for i in data %}
            <option value="{{ i.id }}">{{ i.Subarea }}</option>
            {% endfor %}
        </select>
        </div>
      </div>


      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Enter</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
