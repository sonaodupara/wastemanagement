<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
{% extends 'pickuppages/pickupindex.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">View Profile</h2>
    <form>
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" value="{{ pickup.Name }}"readonly>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Logo</label>
        <div class="col-sm-8">
         <img src="{{ pickup.Logo.url }}" style="height:120px; margin-bottom:10px;">
        </div>
      </div>


      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="email" value="{{ pickup.Email }}"readonly>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" value="{{ pickup.Phone }}"readonly>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Area</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="place" value="{{ pickup.AREA.Area }}"readonly>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Tagline</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="city" value="{{ pickup.Tagline }}"readonly>
        </div>
      </div>

    <div class="row mb-3">
  <div class="offset-sm-4 col-sm-8">
    <a href="/myapp/pickup_viewprofile/" class="btn btn-primary">Edit Profile</a>
  </div>
</div>

    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
