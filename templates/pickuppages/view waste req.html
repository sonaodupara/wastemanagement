<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Data Table</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container mt-5">
    <h2 class="mb-4">Waste Request</h2>
    <table id="registrationTable" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>User</th>
          <th>Date</th>
          <th>Status</th>
          <th>-</th>
{#          <th>-</th>#}
        </tr>
      </thead>
      <tbody>
        <!-- Sample Data Row -->
        {% for i in data %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ i.USERS.Name }}</td>
          <td>{{ i.Date }}</td>
          <td>{{ i.Status }}</td>
          <td><a href="/myapp/approve_wasterequest/{{ i.id }}#abc" class="btn btn-success">Approve</a>
         <a href="/myapp/reject_wasterequest/{{ i.id }}#abc" class="btn btn-success">Reject</a>

{#            <td><a href="/myapp/pickup_managebill/{{ i.id }}#abc" class="btn btn-group-sm">Add bill</a>#}
{#              <a href="/myapp/pickup_viewbill/{{ i.id }}" class="btn btn-group-sm">View Bill</a></td>#}
        </tr>
        {% endfor %}
        <!-- Add more rows dynamically from backend -->
      </tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script>
    $(document).ready(function () {
      $('#registrationTable').DataTable();
    });
  </script>
{% endblock %}
</body>
</html>
