<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container">
    <h2 class="mb-4">Manage Subarea</h2>
    <form action="/myapp/pickup_managesubarea_post/" method="post">
    {% csrf_token %}
      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Area</label>
        <div class="col-sm-8">
          <select name="area" class="form-control">
              {% for i in area %}
              <option value="{{ i.id }}">{{ i.Area }}</option>
              {% endfor %}
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Sub Area</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="subarea"name="subarea" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Enter</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
