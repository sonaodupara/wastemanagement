<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
</head>
<body>

  <div class="container">
    <h2 class="mb-4">Registration Form</h2>
    <form action="/myapp/pickup_register_post/" method="post" enctype="multipart/form-data">
        {% csrf_token %}
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Logo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" name="logo" accept="image/*" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" name="phone" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Area</label>
        <div class="col-sm-8">
          <select name="area" class="form-control">
              {% for i in area %}
              <option value="{{ i.id }}">{{ i.Area }}</option>
              {% endfor %}
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">latitude</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="city" name="latitude" required>
        </div>
      </div>
      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">longitude</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="city" name="longitude" required>
        </div>
      </div>
      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Tagline</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="city" name="tagline" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
