<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat UI with Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% extends 'pickuppages/pickupindex.html '%}
{% block body %}
  <div class="container-fluid mt-4">
    <div class="row">
      
      <!-- Left Sidebar: User List -->
      <div class="col-md-3 border-end">
        <h5 class="mb-3">Users</h5>

        <!-- Search box -->
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Search users...">
        </div>

        <!-- User List -->
        <div class="list-group overflow-auto" style="max-height: 75vh;">
          <a href="#" class="list-group-item list-group-item-action d-flex align-items-start">
            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" alt="User 1">
            <div>
              <div class="fw-bold">Alice John</div>
              <small>alice@example.com</small>
            </div>
          </a>
          <a href="#" class="list-group-item list-group-item-action d-flex align-items-start">
            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" alt="User 2">
            <div>
              <div class="fw-bold">Bob Smith</div>
              <small>bob@example.com</small>
            </div>
          </a>
          <a href="#" class="list-group-item list-group-item-action d-flex align-items-start">
            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" alt="User 3">
            <div>
              <div class="fw-bold">Catherine Ray</div>
              <small>catherine@example.com</small>
            </div>
          </a>
        </div>
      </div>

      <!-- Right Side: Chat Box -->
      <div class="col-md-9 d-flex flex-column" style="height: 80vh;">
        <h5 class="border-bottom pb-2 mb-3">Chat with Alice John</h5>

        <!-- Messages Area -->
        <div class="flex-grow-1 overflow-auto mb-3" style="height: 100%;">
          <div class="mb-2">
            <div class="text-start">
              <span class="badge bg-light text-dark">Alice: Hello!</span>
            </div>
          </div>
          <div class="mb-2">
            <div class="text-end">
              <span class="badge bg-primary">You: Hi Alice!</span>
            </div>
          </div>
        </div>

        <!-- Message Input -->
        <form class="d-flex">
          <input type="text" class="form-control me-2" placeholder="Type your message...">
          <button class="btn btn-primary" type="submit">Send</button>
        </form>
      </div>

    </div>
  </div>
{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
